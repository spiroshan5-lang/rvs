<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RIKO Preloader</title>
<style>
  body{margin:0;background:#0B0B0B;}
  #preloader {
    position: fixed; top:0; left:0; width:100vw; height:100vh;
    background: #0B0B0B; z-index: 99999;
    display:flex; justify-content:center; align-items:center; flex-direction:column;
    transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.2s;
  }
  .preloader-logo-container {
    position: relative; width:150px; height:150px;
    display:flex; justify-content:center; align-items:center;
    transform: scale(0.9); animation: zoomIn 1.5s ease-out forwards;
  }
  .preloader-logo {
    width:120px; height:120px; object-fit:contain;
    filter: drop-shadow(0 0 15px rgba(201,168,106,0.3)); z-index:2;
  }
  .preloader-ring {
    position:absolute; top:0; left:0; width:100%; height:100%;
    border:2px solid transparent;
    border-top-color:#C9A86A; border-bottom-color:#C9A86A;
    border-radius:50%; animation: rotateRing 3s linear infinite;
  }
  .preloader-glow {
    position:absolute; width:130px; height:130px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,168,106,0.15) 0%, transparent 70%);
    animation: pulseGlow 2s ease-in-out infinite alternate;
  }
  .preloader-text {
    margin-top:30px; font-family:'Inter',sans-serif;
    font-size:0.75rem; font-weight:200; letter-spacing:0.4em;
    text-transform:uppercase; color:#8E8E8E;
    animation: fadePulse 1.8s ease-in-out infinite;
  }
  @keyframes rotateRing { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
  @keyframes pulseGlow { 0%{transform:scale(0.95);opacity:0.5;} 100%{transform:scale(1.1);opacity:1;} }
  @keyframes fadePulse { 0%,100%{opacity:0.3;} 50%{opacity:0.8;} }
  @keyframes zoomIn { 0%{transform:scale(0.7);opacity:0;} 100%{transform:scale(1);opacity:1;} }
</style>
</head>
<body>
  <div id="preloader">
    <div class="preloader-logo-container">
      <div class="preloader-glow"></div>
      <div class="preloader-ring"></div>
      <img src="assets/riko_logo_circular.png" alt="RIKO Crest" class="preloader-logo">
    </div>
    <div class="preloader-text">Riko Experience</div>
  </div>

  <script>
    function initializePreloader() {
      const preloader = document.getElementById('preloader');
      if (!preloader) return;
      window.addEventListener('load', fadePreloader);
      setTimeout(fadePreloader, 2500);
      function fadePreloader() {
        if (preloader.style.opacity === '0') return;
        preloader.style.opacity = '0';
        preloader.style.visibility = 'hidden';
        // Original code also triggers hero text animation here:
        // setTimeout(animateHeroText, 400);
        // (omitted — animateHeroText() lives outside the preloader and
        // targets .hero-sub-luxury / .hero-title-oversized / etc.,
        // not part of the loading screen itself)
      }
    }
    initializePreloader();
  </script>
</body>
</html>
